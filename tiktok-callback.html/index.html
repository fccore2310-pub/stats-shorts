<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>TikTok Auth Callback</title>
<style>
  body { font-family: -apple-system, system-ui, sans-serif; max-width: 720px; margin: 4rem auto; padding: 0 1.5rem; color: #1a1a1a; line-height: 1.6; }
  h1 { font-size: 1.6rem; }
  code { background: #f4f4f4; padding: 0.5rem 0.75rem; border-radius: 6px; display: block; word-break: break-all; font-size: 0.95rem; margin: 1rem 0; }
  button { padding: 0.6rem 1rem; font-size: 0.95rem; cursor: pointer; border: 1px solid #ccc; border-radius: 6px; background: #fff; }
  button:hover { background: #f4f4f4; }
  .ok { color: #1f7a1f; }
  .err { color: #b00020; }
</style>
</head>
<body>
<h1>TikTok Auth Callback</h1>
<div id="out">Procesando…</div>

<script>
const params = new URLSearchParams(window.location.search);
const code = params.get('code');
const error = params.get('error');
const errDesc = params.get('error_description');
const out = document.getElementById('out');

if (error) {
  out.innerHTML = `<p class="err">❌ Error: <strong>${error}</strong></p><p>${errDesc || ''}</p>`;
} else if (code) {
  out.innerHTML = `
    <p class="ok">✅ Auth code recibido.</p>
    <p>Copia este código y pégalo en la terminal donde se ejecuta el publisher:</p>
    <code id="code">${code}</code>
    <button onclick="navigator.clipboard.writeText(document.getElementById('code').textContent); this.textContent='Copiado ✓'">Copiar al portapapeles</button>
    <p><small>Esta página solo lee el parámetro <code style="display:inline">?code=</code> de la URL. No se envía nada a ningún servidor.</small></p>
  `;
} else {
  out.innerHTML = `<p class="err">⚠️ No se recibió ningún <code style="display:inline">code</code>. ¿Has llegado aquí desde TikTok?</p>`;
}
</script>
</body>
</html>
